name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -s -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=acsc0kocwsss0ossw04sk8wg&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          echo "Deploy triggered"
